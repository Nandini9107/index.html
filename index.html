<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorting Visualizer - Nandini</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b1220;
    color: white;
    text-align: center;
}

/* HEADER */
header {
    padding: 15px;
    font-size: 22px;
    font-weight: bold;
    color: #00d4ff;
}

/* CONTROLS */
.controls {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
    padding: 10px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
}

button, select, input {
    padding: 10px;
    border: none;
    border-radius: 8px;
    outline: none;
}

button {
    background: #00d4ff;
    color: black;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: white;
}

/* ARRAY AREA */
#array {
    display: flex;
    align-items: flex-end;
    justify-content: center;
    height: 450px;
    margin-top: 20px;
}

.bar {
    width: 14px;
    margin: 2px;
    background: linear-gradient(180deg, #4facfe, #00f2fe);
    border-radius: 4px;
    transition: 0.2s;
}

.bar.compare {
    background: #ffb703;
}

.bar.swap {
    background: #fb8500;
}

.bar.sorted {
    background: #2ecc71;
}
</style>
</head>

<body>

<header>Sorting Visualizer</header>
<p style="color:#94a3b8;">By Nandini • Clean UI Edition</p>

<div class="controls">

<select id="algo">
    <option value="bubble">Bubble Sort</option>
    <option value="selection">Selection Sort</option>
    <option value="merge">Merge Sort</option>
</select>

<button onclick="generateArray()">Generate Array</button>
<button onclick="startSort()">Start Sorting</button>

<label>Speed</label>
<input type="range" id="speed" min="10" max="300" value="120">

</div>

<div id="array"></div>

<script>

let bars = [];
let speed = 120;

document.getElementById("speed").oninput = (e) => {
    speed = e.target.value;
};

function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
}

/* GENERATE ARRAY */
function generateArray() {
    const container = document.getElementById("array");
    container.innerHTML = "";
    bars = [];

    for (let i = 0; i < 40; i++) {
        let val = Math.floor(Math.random() * 350) + 20;

        let bar = document.createElement("div");
        bar.classList.add("bar");
        bar.style.height = val + "px";

        container.appendChild(bar);
        bars.push(bar);
    }
}

/* BUBBLE SORT */
async function bubbleSort() {
    for (let i = 0; i < bars.length; i++) {
        for (let j = 0; j < bars.length - i - 1; j++) {

            bars[j].classList.add("compare");
            bars[j+1].classList.add("compare");

            await sleep(speed);

            let a = parseInt(bars[j].style.height);
            let b = parseInt(bars[j+1].style.height);

            if (a > b) {
                bars[j].classList.add("swap");
                bars[j+1].classList.add("swap");

                await sleep(speed);

                bars[j].style.height = b + "px";
                bars[j+1].style.height = a + "px";
            }

            bars[j].classList.remove("compare", "swap");
            bars[j+1].classList.remove("compare", "swap");
        }

        bars[bars.length - i - 1].classList.add("sorted");
    }
}

/* CONTROLLER */
async function startSort() {
    const algo = document.getElementById("algo").value;

    if (algo === "bubble") await bubbleSort();
    else await bubbleSort(); // placeholder for future algorithms
}

generateArray();

</script>

</body>
</html>
