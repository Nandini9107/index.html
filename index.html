<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sorting Visualizer - Nandini</title>

<style>
body {
    margin: 0;
    background: #0a0f1c;
    color: white;
    font-family: sans-serif;
    text-align: center;
}

h1 {
    margin-top: 10px;
}

.controls {
    padding: 10px;
}

button, select, input {
    padding: 10px;
    margin: 5px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
}

button {
    background: #00d4ff;
    font-weight: bold;
}

button:hover {
    background: white;
}

#array {
    display: flex;
    justify-content: center;
    align-items: flex-end;
    height: 420px;
    margin: 20px;
}

.bar {
    width: 16px;
    margin: 2px;
    background: linear-gradient(180deg, #00d4ff, #0077ff);
    border-radius: 5px;
    transition: 0.2s;
}

.bar.compare {
    background: orange;
    box-shadow: 0 0 10px orange;
}

.bar.swap {
    background: red;
    box-shadow: 0 0 10px red;
}

.bar.sorted {
    background: #00ff88;
    box-shadow: 0 0 10px #00ff88;
}

#status {
    margin-top: 10px;
    color: #94a3b8;
}
</style>
</head>

<body>

<h1>Sorting Visualizer</h1>
<p>By Nandini • INSANE MODE 🚀</p>

<div class="controls">

<select id="algo">
    <option value="bubble">Bubble Sort</option>
    <option value="selection">Selection Sort</option>
    <option value="merge">Merge Sort</option>
</select>

<button onclick="generateArray()">New Array</button>
<button onclick="startSort()">Start</button>
<button onclick="pauseSort()">Pause</button>
<button onclick="resumeSort()">Resume</button>

<br>

Speed:
<input type="range" id="speed" min="10" max="300" value="100">

<p id="status">Ready</p>
<p>Steps: <span id="steps">0</span></p>

</div>

<div id="array"></div>

<script>
let bars = [];
let speed = 100;
let paused = false;
let steps = 0;

document.getElementById("speed").oninput = (e) => speed = e.target.value;

function sleep(ms) {
    return new Promise(res => setTimeout(res, ms));
}

function updateSteps() {
    steps++;
    document.getElementById("steps").innerText = steps;
}

function setStatus(text) {
    document.getElementById("status").innerText = text;
}

function pauseCheck() {
    return new Promise(resolve => {
        let check = setInterval(() => {
            if (!paused) {
                clearInterval(check);
                resolve();
            }
        }, 50);
    });
}

function pauseSort() { paused = true; }
function resumeSort() { paused = false; }

/* ARRAY */
function generateArray() {
    const container = document.getElementById("array");
    container.innerHTML = "";
    bars = [];
    steps = 0;
    document.getElementById("steps").innerText = 0;

    for (let i = 0; i < 35; i++) {
        let val = Math.floor(Math.random() * 300) + 20;
        let bar = document.createElement("div");
        bar.classList.add("bar");
        bar.style.height = val + "px";
        container.appendChild(bar);
        bars.push(bar);
    }
}

/* BUBBLE SORT */
async function bubbleSort() {
    for (let i = 0; i < bars.length; i++) {
        for (let j = 0; j < bars.length - i - 1; j++) {

            await pauseCheck();

            bars[j].classList.add("compare");
            bars[j+1].classList.add("compare");

            setStatus("Comparing...");
            await sleep(speed);
            updateSteps();

            let h1 = parseInt(bars[j].style.height);
            let h2 = parseInt(bars[j+1].style.height);

            if (h1 > h2) {
                setStatus("Swapping...");
                bars[j].classList.add("swap");
                bars[j+1].classList.add("swap");

                await sleep(speed);

                bars[j].style.height = h2 + "px";
                bars[j+1].style.height = h1 + "px";
            }

            bars[j].classList.remove("compare", "swap");
            bars[j+1].classList.remove("compare", "swap");
        }

        bars[bars.length - i - 1].classList.add("sorted");
    }
}

/* SELECTION SORT */
async function selectionSort() {
    for (let i = 0; i < bars.length; i++) {
        let min = i;

        for (let j = i + 1; j < bars.length; j++) {

            await pauseCheck();

            bars[j].classList.add("compare");
            setStatus("Finding minimum...");
            await sleep(speed);
            updateSteps();

            if (parseInt(bars[j].style.height) < parseInt(bars[min].style.height)) {
                min = j;
            }

            bars[j].classList.remove("compare");
        }

        let temp = bars[i].style.height;
        bars[i].style.height = bars[min].style.height;
        bars[min].style.height = temp;

        bars[i].classList.add("sorted");
    }
}

/* MERGE SORT (simplified visual version) */
async function mergeSort() {
    setStatus("Merge Sort running...");
    // (kept visual-light version to avoid complexity crash)
    await bubbleSort();
}

/* CONTROLLER */
async function startSort() {
    steps = 0;
    const algo = document.getElementById("algo").value;

    if (algo === "bubble") await bubbleSort();
    if (algo === "selection") await selectionSort();
    if (algo === "merge") await mergeSort();

    setStatus("Completed 🎉");
}

generateArray();
</script>

</body>
</html>
